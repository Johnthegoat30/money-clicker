<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengar Klickare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .money-display {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .click-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            margin: 30px 0;
            transition: transform 0.1s, box-shadow 0.1s;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .click-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
        }
        
        .click-button:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.4);
        }
        
        .upgrades {
            margin-top: 40px;
            text-align: left;
        }
        
        .upgrades h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        
        .upgrade-item {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .upgrade-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .upgrade-info p {
            color: #666;
            font-size: 0.9em;
        }
        
        .upgrade-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        
        .upgrade-button:hover:not(:disabled) {
            background: #45a049;
        }
        
        .upgrade-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .stats {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }
        
        .stat-item {
            margin: 10px 0;
            color: #333;
        }
        
        .stat-label {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Pengar Klickare 💰</h1>
        
        <div class="money-display" id="moneyDisplay">0 kr</div>
        
        <button class="click-button" id="clickButton">KLICKA!</button>
        
        <div class="upgrades">
            <h2>Uppgraderingar</h2>
            
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <h3>Automatisk Klickare</h3>
                    <p>Klickar automatiskt var sekund</p>
                </div>
                <button class="upgrade-button" id="autoClickerBtn">100 kr</button>
            </div>
            
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <h3>Dubbel Bonus</h3>
                    <p>Varje klick är värd 2x mer</p>
                </div>
                <button class="upgrade-button" id="doubleBtn">500 kr</button>
            </div>
            
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <h3>Super Klickare</h3>
                    <p>Nästa klick är värd 50 kr</p>
                </div>
                <button class="upgrade-button" id="superBtn">1000 kr</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item"><span class="stat-label">Automatiska Klickare:</span> <span id="autoClickerCount">0</span></div>
            <div class="stat-item"><span class="stat-label">Multiplikator:</span> <span id="multiplier">1</span>x</div>
        </div>
    </div>
    
    <script>
        let money = 0;
        let clickValue = 1;
        let autoClickers = 0;
        let multiplier = 1;
        
        const moneyDisplay = document.getElementById('moneyDisplay');
        const clickButton = document.getElementById('clickButton');
        const autoClickerBtn = document.getElementById('autoClickerBtn');
        const doubleBtn = document.getElementById('doubleBtn');
        const superBtn = document.getElementById('superBtn');
        const autoClickerCount = document.getElementById('autoClickerCount');
        const multiplierDisplay = document.getElementById('multiplier');
        
        // Load game from localStorage
        function loadGame() {
            const saved = localStorage.getItem('moneyClickerGame');
            if (saved) {
                const data = JSON.parse(saved);
                money = data.money || 0;
                clickValue = data.clickValue || 1;
                autoClickers = data.autoClickers || 0;
                multiplier = data.multiplier || 1;
                updateDisplay();
            }
        }
        
        // Save game to localStorage
        function saveGame() {
            localStorage.setItem('moneyClickerGame', JSON.stringify({
                money,
                clickValue,
                autoClickers,
                multiplier
            }));
        }
        
        function updateDisplay() {
            moneyDisplay.textContent = `${Math.floor(money)} kr`;
            autoClickerCount.textContent = autoClickers;
            multiplierDisplay.textContent = multiplier;
            updateButtonStates();
        }
        
        function updateButtonStates() {
            autoClickerBtn.disabled = money < 100;
            doubleBtn.disabled = money < 500;
            superBtn.disabled = money < 1000;
        }
        
        // Main click function
        clickButton.addEventListener('click', function() {
            const earnedMoney = clickValue * multiplier;
            money += earnedMoney;
            updateDisplay();
            saveGame();
        });
        
        // Auto Clicker upgrade
        autoClickerBtn.addEventListener('click', function() {
            if (money >= 100) {
                money -= 100;
                autoClickers++;
                updateDisplay();
                saveGame();
            }
        });
        
        // Double Money upgrade
        doubleBtn.addEventListener('click', function() {
            if (money >= 500) {
                money -= 500;
                multiplier *= 2;
                updateDisplay();
                saveGame();
            }
        });
        
        // Super Clicker upgrade
        superBtn.addEventListener('click', function() {
            if (money >= 1000) {
                money -= 1000;
                clickValue += 50;
                updateDisplay();
                saveGame();
            }
        });
        
        // Auto clicker loop
        setInterval(function() {
            if (autoClickers > 0) {
                money += autoClickers * clickValue * multiplier;
                updateDisplay();
                saveGame();
            }
        }, 1000);
        
        // Load on page load
        loadGame();
    </script>
</body>
</html>
